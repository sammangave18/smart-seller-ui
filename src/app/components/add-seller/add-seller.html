<app-layout pageTitle="Add Seller">
<div class="form-page">


    <div class="form-card">

        <h1>Add Seller</h1>

        <div class="form-group">

            <label>Username</label>

            <input type="text" [(ngModel)]="username" placeholder="Enter username">

        </div>

        <div class="form-group">

            <label>Email</label>

            <input type="email" [(ngModel)]="email" placeholder="Enter email">

        </div>

        <div class="form-group">

            <label>Password</label>

            <input type="password" [(ngModel)]="password" placeholder="Enter password">

        </div>

        <button class="save-btn" (click)="saveSeller()">

            Save Seller

        </button>

    </div>


</div></app-layout>
